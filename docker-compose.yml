
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  telemetry-service:
      build: ./drone_system/telemetry_service
      ports:
        - "8001:8000"
      depends_on:
        - kafka
        - redis

  gateway-service:
      build: ./drone_system/gateway_service
      ports:
        - "8000:8000"
      depends_on:
        - kafka
        - redis

  mission-service:
      build: ./drone_system/mission_service
      ports:
        - "8002:8000"
      depends_on:
        - kafka
        - redis
  